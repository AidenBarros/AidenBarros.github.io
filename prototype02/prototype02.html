<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Prototype 02</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

/* Zone carrée du jeu */
#game{
    position:absolute;
    top:50%;
    left:50%;

    width:min(100vw, 100vh);
    height:min(100vw, 100vh);

    transform:translate(-50%, -50%);
    overflow:hidden;
    background:black;
}

/* Fond de la pièce */
#room{
    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:contain;
    user-select:none;
    pointer-events:none;

    z-index:1;
}

/* Personnage */
#player{
    position:absolute;

    left:54%;
    top:52%;

    width:8%;
    aspect-ratio:1;

    transform:translate(-50%, -50%) rotate(45deg);
    transform-origin:center;

    overflow:hidden;
    pointer-events:none;

    z-index:10;
}

/*
L’image oc.png contient beaucoup de blanc autour du personnage.
On l’agrandit dans une petite fenêtre pour n’afficher que le centre.
*/
#player img{
    position:absolute;

    width:500%;
    height:500%;

    left:-200%;
    top:-200%;

    user-select:none;
    pointer-events:none;
}

/* Zones cliquables invisibles */
.interaction-zone{
    position:absolute;
    cursor:pointer;
    z-index:15;
}

/* Rose */
#pinkTop{
    left:30%;
    top:11%;
    width:12%;
    height:13%;
}

#pinkCabinet{
    left:21%;
    top:35%;
    width:15%;
    height:18%;
}

/* Vert */
#greenTop{
    left:2%;
    top:18%;
    width:17%;
    height:33%;
}

#greenFloor{
    left:61%;
    top:58%;
    width:15%;
    height:19%;
}

/* Violet */
#purpleSofa{
    left:77%;
    top:47%;
    width:18%;
    height:32%;
}

/* Violet foncé */
#darkPurpleBag{
    left:39%;
    top:12%;
    width:11%;
    height:13%;
}

/* Bleu */
#blueBin{
    left:2%;
    top:71%;
    width:17%;
    height:14%;
}

/* Rouge */
#redBed{
    left:59%;
    top:17%;
    width:34%;
    height:22%;
}

/* Boîte de dialogue */
#messageBox{
    display:none;

    position:absolute;
    left:50%;
    bottom:5%;

    width:70%;
    padding:16px 22px;

    transform:translateX(-50%);

    background:rgba(0, 0, 0, 0.92);
    border:2px solid white;
    color:white;

    font-family:monospace;
    font-size:20px;
    text-align:center;

    z-index:30;
}

/* Aide pour les commandes */
#controls{
    position:absolute;
    top:2%;
    left:2%;

    padding:7px 10px;

    background:rgba(0, 0, 0, 0.7);
    color:white;

    font-family:monospace;
    font-size:13px;

    z-index:30;
}
</style>
</head>

<body>

<div id="game">

    <img id="room" src="test.png" alt="Room">

    <div id="player">
        <img src="oc.png" alt="Character">
    </div>

    <div id="controls">
        Move: arrows / WASD / ZQSD
    </div>

    <!-- Zones roses -->
    <div id="pinkTop" class="interaction-zone"></div>
    <div id="pinkCabinet" class="interaction-zone"></div>

    <!-- Zones vertes -->
    <div id="greenTop" class="interaction-zone"></div>
    <div id="greenFloor" class="interaction-zone"></div>

    <!-- Zone violette -->
    <div id="purpleSofa" class="interaction-zone"></div>

    <!-- Zone violet foncé -->
    <div id="darkPurpleBag" class="interaction-zone"></div>

    <!-- Zone bleue -->
    <div id="blueBin" class="interaction-zone"></div>

    <!-- Zone rouge -->
    <div id="redBed" class="interaction-zone"></div>

    <div id="messageBox"></div>

</div>

<script>
const player = document.getElementById("player");
const messageBox = document.getElementById("messageBox");

/*
Position du personnage, en pourcentage de l’image.
*/
let playerX = 54;
let playerY = 52;

/* Vitesse */
const speed = 0.35;

/*
Taille approximative du personnage utilisée pour éviter
qu’il entre dans les meubles.
*/
const playerHalfWidth = 2.7;
const playerHalfHeight = 2.7;

const pressedKeys = new Set();

let messageTimer;

/* -------------------------------------------------- */
/* COLLISIONS                                         */
/* -------------------------------------------------- */

/*
Chaque rectangle représente une partie non accessible.

x1 : bord gauche
y1 : bord supérieur
x2 : bord droit
y2 : bord inférieur

Toutes les valeurs sont des pourcentages de l’image.
*/
const blockedAreas = [

    /* Limites extérieures de la pièce */
    { x1:0,  y1:0,  x2:100, y2:17 },
    { x1:0,  y1:84, x2:100, y2:100 },
    { x1:0,  y1:0,  x2:2.5, y2:100 },
    { x1:96, y1:0,  x2:100, y2:100 },

    /* Meubles verts en haut à gauche */
    { x1:2, y1:18, x2:19, y2:51 },

    /* Meuble rose */
    { x1:21, y1:35, x2:36, y2:53 },

    /* Cuisine en bas à gauche */
    { x1:2, y1:50, x2:34, y2:83 },

    /* Meuble central gris */
    { x1:33, y1:50, x2:45, y2:73 },

    /* Murs blancs au centre */
    { x1:22, y1:17, x2:30, y2:36 },
    { x1:22, y1:34, x2:28, y2:46 },
    { x1:40, y1:17, x2:52, y2:35 },

    /* Objet rose en haut */
    { x1:30, y1:10, x2:41, y2:23 },

    /* Sac violet foncé */
    { x1:39, y1:11, x2:50, y2:24 },

    /* Lit rouge */
    { x1:59, y1:17, x2:94, y2:39 },

    /* Objet vert au sol */
    { x1:61, y1:58, x2:76, y2:78 },

    /* Canapé violet */
    { x1:76, y1:46, x2:95, y2:80 },

    /* Poubelle bleue */
    { x1:2, y1:70, x2:19, y2:85 }
];

function pointInsideRectangle(x, y, rectangle){
    return (
        x >= rectangle.x1 &&
        x <= rectangle.x2 &&
        y >= rectangle.y1 &&
        y <= rectangle.y2
    );
}

function positionIsBlocked(x, y){

    /*
    On vérifie plusieurs points autour du personnage,
    pas seulement son centre.
    */
    const points = [
        { x:x,                   y:y },
        { x:x - playerHalfWidth, y:y },
        { x:x + playerHalfWidth, y:y },
        { x:x,                   y:y - playerHalfHeight },
        { x:x,                   y:y + playerHalfHeight }
    ];

    for(const point of points){

        for(const area of blockedAreas){

            if(pointInsideRectangle(point.x, point.y, area)){
                return true;
            }
        }
    }

    return false;
}

/* -------------------------------------------------- */
/* POSITION ET DIRECTION                              */
/* -------------------------------------------------- */

function updatePlayerPosition(){
    player.style.left = playerX + "%";
    player.style.top = playerY + "%";
}

/*
Dans oc.png, la flèche regarde approximativement
vers le haut et la droite.

Les angles ci-dessous compensent cette orientation.
*/
function faceDirection(direction){

    let angle = 45;

    if(direction === "right"){
        angle = 45;
    }

    if(direction === "down"){
        angle = 135;
    }

    if(direction === "left"){
        angle = 225;
    }

    if(direction === "up"){
        angle = -45;
    }

    player.style.transform =
        `translate(-50%, -50%) rotate(${angle}deg)`;
}

function tryMove(horizontal, vertical){

    const nextX = playerX + horizontal;
    const nextY = playerY + vertical;

    /*
    On teste séparément les mouvements horizontaux
    et verticaux pour que le personnage puisse glisser
    le long des meubles.
    */
    if(!positionIsBlocked(nextX, playerY)){
        playerX = nextX;
    }

    if(!positionIsBlocked(playerX, nextY)){
        playerY = nextY;
    }

    updatePlayerPosition();
}

/* -------------------------------------------------- */
/* TOUCHES                                            */
/* -------------------------------------------------- */

document.addEventListener("keydown", function(event){

    const key = event.key.toLowerCase();

    const allowedKeys = [
        "arrowup",
        "arrowdown",
        "arrowleft",
        "arrowright",
        "w",
        "a",
        "s",
        "d",
        "z",
        "q"
    ];

    if(allowedKeys.includes(key)){
        event.preventDefault();
        pressedKeys.add(key);
    }
});

document.addEventListener("keyup", function(event){
    pressedKeys.delete(event.key.toLowerCase());
});

function gameLoop(){

    let movementX = 0;
    let movementY = 0;

    if(
        pressedKeys.has("arrowleft") ||
        pressedKeys.has("a") ||
        pressedKeys.has("q")
    ){
        movementX -= speed;
        faceDirection("left");
    }

    if(
        pressedKeys.has("arrowright") ||
        pressedKeys.has("d")
    ){
        movementX += speed;
        faceDirection("right");
    }

    if(
        pressedKeys.has("arrowup") ||
        pressedKeys.has("w") ||
        pressedKeys.has("z")
    ){
        movementY -= speed;
        faceDirection("up");
    }

    if(
        pressedKeys.has("arrowdown") ||
        pressedKeys.has("s")
    ){
        movementY += speed;
        faceDirection("down");
    }

    /*
    Empêche d’aller plus vite en diagonale.
    */
    if(movementX !== 0 && movementY !== 0){
        movementX *= 0.71;
        movementY *= 0.71;
    }

    if(movementX !== 0 || movementY !== 0){
        tryMove(movementX, movementY);
    }

    requestAnimationFrame(gameLoop);
}

updatePlayerPosition();
gameLoop();

/* -------------------------------------------------- */
/* MESSAGES                                           */
/* -------------------------------------------------- */

function showMessage(text){

    messageBox.textContent = text;
    messageBox.style.display = "block";

    clearTimeout(messageTimer);

    messageTimer = setTimeout(function(){
        messageBox.style.display = "none";
    }, 3500);
}

/* Rose */
document.getElementById("pinkTop").onclick = function(){
    showMessage("I don't want to open that.");
};

document.getElementById("pinkCabinet").onclick = function(){
    showMessage("I don't want to open that.");
};

/* Vert */
document.getElementById("greenTop").onclick = function(){
    showMessage("Ew... I should clean that.");
};

document.getElementById("greenFloor").onclick = function(){
    showMessage("Ew... I should clean that.");
};

/* Violet */
document.getElementById("purpleSofa").onclick = function(){
    showMessage("I should stop sleeping there. It stinks.");
};

/* Violet foncé */
document.getElementById("darkPurpleBag").onclick = function(){
    showMessage("I really need to throw that away...");
};

/* Bleu */
document.getElementById("blueBin").onclick = function(){
    showMessage(
        "There were worms in it last time... Everything needs to be thrown away."
    );
};

/* Rouge */
document.getElementById("redBed").onclick = function(){
    showMessage("I don't have the energy to make this bed...");
};
</script>

</body>
</html>
