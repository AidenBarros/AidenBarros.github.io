<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Aiden - Game</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:monospace;
}

.scene{
    display:none;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.scene img,
.scene video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

/* ---------- HOME MENU ---------- */

#menu{
    display:block;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    z-index:50;
    overflow:hidden;
}

#homeGif{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:50;
    pointer-events:none;
}

.menu-box{
    position:absolute;
    top:46%;
    left:49%;
    transform:translate(-50%, -50%);
    display:flex;
    flex-direction:column;
    gap:4px;
    width:180px;
    z-index:60;
    text-align:center;
}

.chapter-back{
    background:black;
    color:white;
    border:1px solid white;
    padding:10px 18px;
    cursor:pointer;
    font-family:monospace;
    margin-top:25px;
}

.chapter-back:hover{
    background:white;
    color:black;
}

.menu-button{
    background:none;
    border:none;
    color:black;
    cursor:pointer;
    font-family:monospace;
    font-size:22px;
    font-weight:bold;
    padding:2px;
}

.menu-button:hover{
    color:white;
    text-shadow:0 0 6px white;
}

#helpButton, #homeButton{
    position:absolute;
    bottom:25px;
    background:black;
    color:white;
    border:1px solid white;
    padding:10px 18px;
    cursor:pointer;
    font-family:monospace;
    z-index:100;
}

#helpButton{ left:25px; }

#homeButton{
    right:25px;
    display:none;
}

#helpButton:hover, #homeButton:hover{
    background:white;
    color:black;
}

#helpBox{
    display:none;
    position:absolute;
    bottom:70px;
    left:25px;
    width:320px;
    padding:15px;
    background:rgba(0,0,0,.9);
    border:1px solid white;
    color:white;
    font-size:14px;
    line-height:1.5;
    z-index:100;
}

#chapterMenu{
    display:none;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.94);
    color:white;
    z-index:70;
}

.chapter-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:360px;
    font-size:18px;
    line-height:1.8;
}

.chapter-title{
    font-size:24px;
    margin-bottom:20px;
    text-align:center;
}

.chapter-line{ cursor:pointer; }
.chapter-line:hover{ color:#00ff9c; }

.locked{
    color:#555;
    cursor:not-allowed;
}

.option{
    margin-left:25px;
    cursor:pointer;
}

.option:hover{ color:#00ff9c; }

.choice{
    position:absolute;
    cursor:pointer;
}

#choiceWindow{
    left:5%;
    bottom:5%;
    width:35%;
    height:30%;
}

#choiceDoor{
    right:5%;
    bottom:5%;
    width:35%;
    height:30%;
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="Ghost-Story(chosic.com).mp3" type="audio/mpeg">
</audio>

<div id="menu">

    <img src="fond-home.gif" id="homeGif" alt="">

    <div class="menu-box">
        <button class="menu-button" onclick="startGame()">Start</button>
        <button class="menu-button" onclick="openChapters()">Chapters</button>
        <button class="menu-button" onclick="goFullscreen()">Fullscreen</button>
    </div>

</div>

<button id="helpButton" onclick="toggleHelp()">Help</button>
<button id="homeButton" onclick="goHome()">Home</button>

<div id="helpBox">
    If something breaks, reload the page.<br><br>
    If the music or video does not start, press Start again or refresh the page.<br><br>
    Press ESC to leave fullscreen.
</div>

<div id="chapterMenu">
    <div class="chapter-box">
        <div class="chapter-title">Chapters</div>

        <div class="chapter-line" onclick="goToChoice1()">✓ Choice 1</div>

        <div id="optionA1" class="option" onclick="goToOptionA1()">├─ □ Option A1</div>
        <div id="optionB1" class="option" onclick="goToOptionB1()">└─ □ Option B1</div>

        <br>

        <div class="locked">🔒 Choice 2</div>
        <div class="locked">🔒 Choice 3</div>
        <div class="locked">🔒 Choice 4</div>

        <br>


    </div>
</div>

<div class="scene" id="sceneVideo">
    <video id="intro" playsinline>
        <source src="scene1 jeux.mp4" type="video/mp4">
    </video>
</div>

<div class="scene" id="sceneChoice">
    <img src="choix1scene1jeux.jpg">
    <div id="choiceWindow" class="choice"></div>
    <div id="choiceDoor" class="choice"></div>
</div>

<div class="scene" id="sceneWindow">
    <h1 style="color:white;text-align:center;margin-top:45vh;">WINDOW PATH</h1>
</div>

<div class="scene" id="sceneDoor">
    <h1 style="color:white;text-align:center;margin-top:45vh;">DOOR PATH</h1>
</div>

<script>
const menu = document.getElementById("menu");
const chapterMenu = document.getElementById("chapterMenu");
const intro = document.getElementById("intro");
const music = document.getElementById("music");
const homeButton = document.getElementById("homeButton");

let unlocked = {
    optionA1:false,
    optionB1:false
};

function showScene(id){
    document.querySelectorAll(".scene").forEach(scene => {
        scene.style.display = "none";
    });

    document.getElementById(id).style.display = "block";
}

function updateChapters(){
    document.getElementById("optionA1").innerText =
        unlocked.optionA1 ? "├─ ■ Option A1" : "├─ □ Option A1";

    document.getElementById("optionB1").innerText =
        unlocked.optionB1 ? "└─ ■ Option B1" : "└─ □ Option B1";
}

function startMusic(){
    music.volume = 0;
    music.play();

    let volume = 0;

    const fade = setInterval(() => {
        volume += 0.02;
        music.volume = Math.min(volume, 0.35);

        if(volume >= 0.35){
            clearInterval(fade);
        }
    }, 100);
}

function startGame(){
    menu.style.display = "none";
    chapterMenu.style.display = "none";
    homeButton.style.display = "none";

    showScene("sceneVideo");

    startMusic();

    intro.currentTime = 0;
    intro.play();
}

intro.onended = function(){
    showScene("sceneChoice");
};

function openChapters(){
    updateChapters();
    chapterMenu.style.display = "block";
    homeButton.style.display = "block";
}

function closeChapters(){
    chapterMenu.style.display = "none";
    homeButton.style.display = "none";
}

function goToChoice1(){
    menu.style.display = "none";
    chapterMenu.style.display = "none";
    homeButton.style.display = "none";

    startMusic();

    intro.pause();
    showScene("sceneChoice");
}

function goToOptionA1(){
    if(!unlocked.optionA1) return;

    menu.style.display = "none";
    chapterMenu.style.display = "none";

    showScene("sceneWindow");
    homeButton.style.display = "block";
}

function goToOptionB1(){
    if(!unlocked.optionB1) return;

    menu.style.display = "none";
    chapterMenu.style.display = "none";

    showScene("sceneDoor");
    homeButton.style.display = "block";
}

function goFullscreen(){
    const page = document.documentElement;

    if(page.requestFullscreen){
        page.requestFullscreen();
    }
}

function toggleHelp(){
    const helpBox = document.getElementById("helpBox");

    helpBox.style.display = helpBox.style.display === "block" ? "none" : "block";
}

document.getElementById("choiceWindow").onclick = function(){
    unlocked.optionA1 = true;
    updateChapters();

    showScene("sceneWindow");
    homeButton.style.display = "block";
};

document.getElementById("choiceDoor").onclick = function(){
    unlocked.optionB1 = true;
    updateChapters();

    showScene("sceneDoor");
    homeButton.style.display = "block";
};

function goHome(){
    document.querySelectorAll(".scene").forEach(scene => {
        scene.style.display = "none";
    });

    menu.style.display = "block";
    chapterMenu.style.display = "none";

    intro.pause();
    intro.currentTime = 0;

    music.pause();
    music.currentTime = 0;

    homeButton.style.display = "none";
}
</script>

</body>
</html>
