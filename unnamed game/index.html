<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Unnamed</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

.scene{
    position:absolute;
    inset:0;
    display:none;
}

#introScene{
    display:block;
}

.scene video{
    width:100%;
    height:100%;
    object-fit:cover;
}

#interfaceScene img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.click-zone{
    position:absolute;
    cursor:pointer;
    z-index:20;
}

#startZone{ left:42%; top:38%; width:16%; height:8%; }
#fullscreenZone{ left:39%; top:50%; width:22%; height:8%; }
#quitZone{ left:43%; top:62%; width:14%; height:8%; }
#helpZone{ left:1%; bottom:3%; width:18%; height:8%; }

#helpBox{
    display:none;
    position:absolute;
    left:30px;
    bottom:90px;
    width:340px;
    padding:18px;
    border:1px solid white;
    background:rgba(0,0,0,0.9);
    color:white;
    font-family:serif;
    font-size:20px;
    z-index:30;
}

/* création personnage */
#createScene{
    background:black;
}

#BG1{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
}

#encadre{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    pointer-events:none;
    z-index:2;
}

#createText{
    position:absolute;
    right:13.5%;
    top:24.5%;
    width:27%;
    height:46%;
    color:black;
    font-family:serif;
    font-size:22px;
    line-height:1.45;
    text-align:left;
    z-index:10;
}

    #bodyChoice{
    position:absolute;
    right:13.5%;
    top:24.5%;
    width:27%;
    display:none;
    z-index:10;
}

#bodyChoice img{
    width:100%;
    display:block;
}

/* Zones de clic */

#body1Zone{
    right:36.2%;
    top:32%;
    width:6%;
    height:35%;
}

#body2Zone{
    right:28.8%;
    top:32%;
    width:6%;
    height:35%;
}

#body3Zone{
    right:21.3%;
    top:32%;
    width:6%;
    height:35%;
}

#createQuitZone{
    right:13%;
    top:3%;
    width:13%;
    height:8%;
}

#createGoodZone{
    right:17.8%;
    bottom:20.5%;
    width:9.5%;
    height:5.8%;
}
    
</style>
</head>

<body>

<div class="scene" id="introScene">
    <video id="introVideo" autoplay muted playsinline>
        <source src="intro/intro.video.mp4" type="video/mp4">
    </video>
</div>

<div class="scene" id="interfaceScene">
    <img src="intro/interface.png" alt="interface">

    <div id="startZone" class="click-zone"></div>
    <div id="fullscreenZone" class="click-zone"></div>
    <div id="quitZone" class="click-zone"></div>
    <div id="helpZone" class="click-zone"></div>

    <div id="helpBox">
        Create someone.<br>
        Change them.<br>
        See what happens.
    </div>
</div>

<div class="scene" id="createScene">

    <img id="BG1" src="backg/BG1.png" alt="background">

    <img id="encadre" src="encadré & texte/encadre.png" alt="encadre">

    <div id="createText">
    </p>Hey you! So, who are you</p> 
    </p>going to create today?</p>
    </p>Let's start with something</p>
    </p>simple...Choose your body-base !!
    </div>
<div id="bodyChoice">
    <img src="choix/body.png" alt="Body Choice">
</div>

<div id="body1Zone" class="click-zone"></div>
<div id="body2Zone" class="click-zone"></div>
<div id="body3Zone" class="click-zone"></div>
    <div id="createQuitZone" class="click-zone"></div>
    <div id="createGoodZone" class="click-zone"></div>

</div>

<script>
const introVideo = document.getElementById("introVideo");

const introScene = document.getElementById("introScene");
const interfaceScene = document.getElementById("interfaceScene");
const createScene = document.getElementById("createScene");

const startZone = document.getElementById("startZone");
const fullscreenZone = document.getElementById("fullscreenZone");
const quitZone = document.getElementById("quitZone");
const helpZone = document.getElementById("helpZone");
const helpBox = document.getElementById("helpBox");
    
const createText = document.getElementById("createText");
const bodyChoice = document.getElementById("bodyChoice");

const body1Zone = document.getElementById("body1Zone");
const body2Zone = document.getElementById("body2Zone");
const body3Zone = document.getElementById("body3Zone");

const BG1 = document.getElementById("BG1");

const createQuitZone = document.getElementById("createQuitZone");
const createGoodZone = document.getElementById("createGoodZone");

function showScene(scene){
    introScene.style.display = "none";
    interfaceScene.style.display = "none";
    createScene.style.display = "none";

    scene.style.display = "block";
}

function showInterface(){
    showScene(interfaceScene);
}

introVideo.onended = function(){
    showInterface();
};

introVideo.onerror = function(){
    showInterface();
};

startZone.onclick = async function(){

    if (!document.fullscreenElement){
        try{
            await document.documentElement.requestFullscreen();
        }catch(err){
            console.log("Fullscreen refused.");
        }
    }
createText.style.display = "block";
bodyChoice.style.display = "none";

body1Zone.style.display = "none";
body2Zone.style.display = "none";
body3Zone.style.display = "none";
    
    showScene(createScene);

};

fullscreenZone.onclick = function(){
    document.documentElement.requestFullscreen();
};

quitZone.onclick = function(){
    window.close();
};

helpZone.onclick = function(){
    helpBox.style.display = helpBox.style.display === "block" ? "none" : "block";
};

createQuitZone.onclick = function(){
    showInterface();
};

createGoodZone.onclick = function(){

    if(createText.style.display !== "none"){

        createText.style.display = "none";
        bodyChoice.style.display = "block";

        body1Zone.style.display = "block";
        body2Zone.style.display = "block";
        body3Zone.style.display = "block";

        return;
    }

};
    body1Zone.onclick = function(){

    BG1.src = "base1/b1s1.png";

};

body2Zone.onclick = function(){

    BG1.src = "base2/b2s1.png";

};

body3Zone.onclick = function(){

    BG1.src = "base3/b3s1.png";

};
</script>

</body>
</html>
